PRODUCT_URL = "https://fda-approvals-mcp.atlasword.workers.dev"
DODO_PRODUCT_ID_SOLO = "pdt_0NgkSlyyslh52XhEf3368"
DODO_PRODUCT_ID_TEAM = "pdt_0NgkSm1f6Kyo5gDNq3IOZ"
DODO_PRODUCT_ID_PRO  = "pdt_0NgkSm40uD7IEepF4ke8y"
FROM_EMAIL = "prakshatechnologies@gmail.com"
DODO_BASE = "https://live.dodopayments.com"
CUSTOMER_PORTAL_RETURN_URL = "https://fda-approvals-mcp.atlasword.workers.dev/account"

# Secrets:
#   OPENFDA_API_KEY         (optional: raises the 240/min limit to 1000/min)
