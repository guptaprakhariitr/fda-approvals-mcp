name = "fda-approvals-mcp"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "CACHE"
id = "c732a9f0432540fe97ce4a65c3ee7fed"

